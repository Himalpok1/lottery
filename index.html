<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lottery Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --t1:#4FA3D1;--t2:#6BBF59;--t3:#E0913A;--t5:#D9534F;--t10:#8E6FCF;
  --t20:#E8C46A;--t30:#2FB6A8;--t50:#E05C9E;--t100:#C6CDDA;--tx:#7A8497;
  --display:'Archivo Black',Impact,'Arial Black',sans-serif;
  --body:'Archivo',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  --cols:5;--cell:calc(100vw / var(--cols));
  /* themed at runtime */
  --bg:#12141C;--bg2:#1B2030;--panel:#1F2431;--panel2:#262C3B;
  --line:#2E3547;--line2:#3B4459;--text:#F2F1EC;--mute:#8E97AA;--mute2:#5C6579;--accent:#E8C46A;
  /* board surfaces — swapped for light themes */
  --tile:rgba(255,255,255,.055);--tileBd:rgba(255,255,255,.12);--barBg:rgba(0,0,0,.35);
  --railBg:rgba(0,0,0,.35);--chipBg:#fff;--chipInk:#14161C;--slotBg:#fff;--slotInk:#14161C;
  --footBg:#fff;--footInk:#14161C;--scrim:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,.72));
  --shadow:none;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden}
button{font-family:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.hidden{display:none!important}

/* ============ TV BOARD ============ */
#board{position:relative;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#bgLayer{position:absolute;inset:0;z-index:0;overflow:hidden;background:linear-gradient(160deg,var(--bg),var(--bg2))}
#bgLayer img,#bgLayer video{width:100%;height:100%;object-fit:cover;display:block}
#bgScrim{position:absolute;inset:0;background:var(--scrim);z-index:1}
#board>*{position:relative;z-index:2}

.bar{display:flex;align-items:center;gap:calc(var(--cell)*.05);padding:calc(var(--cell)*.035) calc(var(--cell)*.06);
  border-bottom:2px solid var(--tileBd);background:var(--barBg);flex:0 0 auto;backdrop-filter:blur(4px)}
.logo{height:calc(var(--cell)*.13);width:auto;max-width:calc(var(--cell)*.5);object-fit:contain;flex:0 0 auto}
.mark h1{font-family:var(--display);margin:0;line-height:1;font-size:calc(var(--cell)*.088);letter-spacing:-.015em;white-space:nowrap}
.mark .sub{font-family:var(--mono);font-weight:700;color:var(--accent);font-size:calc(var(--cell)*.034);letter-spacing:.2em;text-transform:uppercase}
.legend{margin-left:auto;display:flex;gap:calc(var(--cell)*.022)}
.lg{display:flex;align-items:center;gap:.4em;font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.032);
  padding:.3em .55em;border-radius:999px;background:var(--tile);border:1px solid var(--tileBd)}
.lg i{width:.6em;height:.6em;border-radius:2px;background:var(--c);display:block}

/* jackpot strip */
.jp{display:flex;gap:calc(var(--cell)*.02);padding:calc(var(--cell)*.02) calc(var(--cell)*.06);
  background:var(--barBg);border-bottom:1px solid var(--tileBd);flex:0 0 auto;overflow:hidden}
.jpi{display:flex;align-items:baseline;gap:.45em;padding:.25em .7em;border-radius:8px;background:var(--tile);border:1px solid var(--tileBd);white-space:nowrap}
.jpi b{font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.03);letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
.jpi s{text-decoration:none;font-family:var(--display);font-size:calc(var(--cell)*.05);color:var(--accent)}
.jpi em{font-style:normal;font-family:var(--mono);font-size:calc(var(--cell)*.026);color:var(--mute2)}

/* draw-game results ticker — Powerball, Pick 3 &c., fetched live from texaslottery.com,
   crawling along the bottom like a news channel. The track holds the games twice over;
   sliding it half its own width and looping reads as one endless belt. */
.dw{display:block;padding:0;overflow:hidden;background:var(--barBg);
  border-top:1px solid var(--tileBd);flex:0 0 auto;backdrop-filter:blur(4px)}
.dwTrack{display:inline-flex;white-space:nowrap;will-change:transform;
  animation:crawl var(--dwSecs,80s) linear infinite}
@keyframes crawl{to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.dwTrack{animation:none}}
.dwHalf{display:inline-flex;align-items:center}
.dwi{display:inline-flex;align-items:center;gap:calc(var(--cell)*.02);
  padding:calc(var(--cell)*.022) calc(var(--cell)*.045);border-right:1px solid var(--tileBd)}
.dwi .glogo{height:calc(var(--cell)*.08);object-fit:contain}
.dwi .gname{font-family:var(--display);font-size:calc(var(--cell)*.04);line-height:1;white-space:nowrap}
.dwi .amt{font-family:var(--display);font-size:calc(var(--cell)*.052);color:var(--accent);line-height:1;white-space:nowrap}
.dwi .amt.alert{color:#FF4D4D}
.dwi .lbl{font-family:var(--mono);font-weight:700;font-size:calc(var(--cell)*.026);letter-spacing:.06em;
  text-transform:uppercase;color:var(--mute);white-space:nowrap}
.dwi .balls{display:inline-flex;gap:calc(var(--cell)*.007)}
.dwi .balls i{font-style:normal;font-family:var(--mono);font-weight:800;
  width:calc(var(--cell)*.06);height:calc(var(--cell)*.06);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell)*.029);
  background:#fff;color:#14161C;border:1px solid rgba(0,0,0,.18)}
.dwi .balls i.sp{background:#E11D2E;color:#fff;border-color:#E11D2E}
.dwi .balls i.fb{background:#F5A623;color:#14161C;border-color:#F5A623}

.stage{flex:1 1 auto;display:flex;min-height:0}
.grid{flex:1 1 auto;display:grid;grid-template-columns:repeat(var(--cols),1fr);grid-auto-rows:1fr;
  gap:calc(var(--cell)*.022);padding:calc(var(--cell)*.025);min-height:0}
/* square tiles: sized to explicit px tracks by fitGrid(), centered instead of stretched */
.grid.square{flex:0 0 auto;margin:auto}

/* a ticket tile */
.tk{position:relative;display:flex;flex-direction:column;border-radius:calc(var(--cell)*.02);overflow:hidden;
  background:var(--tile);border:1px solid var(--tileBd);box-shadow:var(--shadow);min-height:0}
.tk.dim{opacity:.22;filter:saturate(.3)}
.tk.pick{outline:calc(var(--cell)*.012) solid var(--c);outline-offset:-2px;background:var(--tile);filter:brightness(1.06)}
.tk.empty{background:transparent;border-style:dashed}

.tkArt{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
.tkArt img{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:122%;height:122%;object-fit:cover;display:block}
.tkArt .noart{font-family:var(--mono);font-size:calc(var(--cell)*.03);color:var(--mute2);text-align:center;padding:calc(var(--cell)*.03)}
/* price chip, slot no, game no — laid over the art like the real thing */
.chipL{position:absolute;left:calc(var(--cell)*.02);top:calc(var(--cell)*.02);background:var(--chipBg);color:var(--chipInk);
  font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.032);padding:.2em .45em;border-radius:4px}
.slotNo{position:absolute;left:50%;top:0;transform:translateX(-50%);background:var(--slotBg);color:var(--slotInk);
  font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.044);padding:.12em .5em;border-radius:0 0 6px 6px;min-width:2.1em;text-align:center}
.gameNo{position:absolute;right:calc(var(--cell)*.02);top:calc(var(--cell)*.02);background:var(--chipBg);color:var(--chipInk);
  font-family:var(--mono);font-weight:700;font-size:calc(var(--cell)*.024);padding:.2em .4em;border-radius:4px;line-height:1.15;text-align:right}
.flag{position:absolute;left:calc(var(--cell)*.02);bottom:calc(var(--cell)*.02);display:flex;gap:3px}
.flag span{font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.022);padding:.2em .4em;border-radius:3px;color:#14161C}
.f-new{background:#6BBF59}.f-lucky{background:#E8C46A}.f-end{background:#D9534F;color:#fff}

.tkFoot{flex:0 0 auto;background:var(--footBg);color:var(--footInk);border-top:1px solid var(--tileBd);display:flex;align-items:center;justify-content:space-between;
  gap:.4em;padding:calc(var(--cell)*.022) calc(var(--cell)*.03)}
.tkFoot .st{font-family:var(--display);font-size:calc(var(--cell)*.036);letter-spacing:-.01em;line-height:1.1}
.tkFoot .st.low{color:#C0392B}
.tkFoot .cur{text-align:right;line-height:1.05}
.tkFoot .cur b{display:block;font-family:var(--body);font-weight:700;font-size:calc(var(--cell)*.02);color:#7A8497}
.tkFoot .cur s{text-decoration:none;font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.036);color:var(--c)}
.tkBar{flex:0 0 auto;height:calc(var(--cell)*.022);background:var(--c)}
.tkName{position:absolute;inset:auto 0 0 0;display:none}

/* spotlight (recommended game / ticket on number) */
.spot{flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:4vw;padding:2vw 4vw;min-height:0}
.spot img{max-height:62vh;max-width:34vw;object-fit:contain;border-radius:10px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.spot .info{max-width:44vw}
.spot .kick{font-family:var(--mono);font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-size:1.5vw}
.spot h2{font-family:var(--display);font-size:5.2vw;line-height:.98;margin:.18em 0;letter-spacing:-.02em;overflow-wrap:anywhere}
.spot .row{display:flex;gap:1.4vw;align-items:center;margin-top:1.2vw;flex-wrap:wrap}
.spot .big{font-family:var(--display);font-size:4vw;color:var(--c);line-height:1}
.spot .pillx{font-family:var(--mono);font-weight:800;font-size:1.5vw;background:var(--tile);
  border:1px solid var(--tileBd);padding:.35em .7em;border-radius:999px}

/* ad rail + winners ticker */
.rail{flex:0 0 auto;width:calc(var(--cell)*1.05);border-left:1px solid var(--tileBd);
  background:var(--railBg);display:flex;flex-direction:column;padding:calc(var(--cell)*.03);gap:calc(var(--cell)*.03)}
.ad{flex:1 1 auto;display:flex;flex-direction:column;gap:.5em;align-items:center;justify-content:center;text-align:center;
  border:1px solid var(--tileBd);border-radius:calc(var(--cell)*.02);padding:calc(var(--cell)*.03);overflow:hidden;
  background:var(--tile);transition:opacity .5s}
.ad img{max-width:100%;max-height:60%;object-fit:contain;border-radius:6px}
.ad .txt{font-family:var(--display);font-size:calc(var(--cell)*.05);line-height:1.15;overflow-wrap:anywhere}
.ad .kick{font-family:var(--mono);font-size:calc(var(--cell)*.024);letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.win{flex:0 0 auto;border-top:1px solid var(--tileBd);padding-top:calc(var(--cell)*.03)}
.win .kick{font-family:var(--mono);font-size:calc(var(--cell)*.024);letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.5em}
.win .w{display:flex;justify-content:space-between;gap:.5em;font-size:calc(var(--cell)*.028);padding:.3em 0;border-bottom:1px dashed var(--tileBd)}
.win .w b{font-family:var(--mono);color:#6BBF59}

/* ---- ticket card (Texas Lottery style: art carries the price + game no) ---- */
.tc{position:relative;display:flex;flex-direction:column;min-height:0;border-radius:calc(var(--cell)*.035);
  background:var(--cardBg,#fff);box-shadow:var(--cardSh,0 3px 10px rgba(20,23,31,.13));overflow:hidden;
  border:1px solid var(--tileBd)}
.tc.dim{opacity:.2;filter:saturate(.25)}
.tc.pick{outline:calc(var(--cell)*.012) solid var(--accent);outline-offset:-1px}
.tc.empty{background:transparent;border:1px dashed var(--tileBd);box-shadow:none}
.tcArt{flex:1 1 auto;position:relative;min-height:0;display:flex;align-items:center;justify-content:center;
  overflow:hidden}
/* zoom in and anchor to the bottom, cropping off the price/game-number strip the
   state prints across the top of every ticket photo — our own slot badge covers that job */
.tcArt img{position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:122%;height:122%;object-fit:cover;display:block}
.tcArt .noart{font-family:var(--mono);font-size:calc(var(--cell)*.03);color:#9CA3AF;text-align:center;line-height:1.4;padding:calc(var(--cell)*.03)}
.tcArt .pxy{font-family:var(--display);color:#111827;text-align:center;line-height:1.05;padding:calc(var(--cell)*.03)}
.tcArt .pxy b{display:block;font-size:calc(var(--cell)*.075)}
.tcArt .pxy s{text-decoration:none;display:block;font-family:var(--mono);font-size:calc(var(--cell)*.03);color:#6B7280}
/* the slot number — what the customer says out loud */
.slotB{position:absolute;left:0;top:0;background:var(--accent);color:#fff;
  font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.13);line-height:1;
  padding:calc(var(--cell)*.035) calc(var(--cell)*.055);border-radius:0 0 calc(var(--cell)*.04) 0;
  box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:2}
/* the ticket price — same colour as its price-tier dot in the legend up top */
.priceB{position:absolute;right:0;top:0;background:var(--c);color:#fff;
  font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.13);line-height:1;
  padding:calc(var(--cell)*.035) calc(var(--cell)*.055);border-radius:0 0 0 calc(var(--cell)*.04);
  box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:2}
/* the state's own CLOSING SOON corner ribbon */
.ribbon{position:absolute;right:0;bottom:0;width:60%;height:60%;overflow:hidden;z-index:2;pointer-events:none}
.ribbon i{position:absolute;right:-32%;bottom:18%;width:150%;transform:rotate(-45deg);transform-origin:center;
  background:#E11D2E;color:#fff;text-align:center;font-family:var(--body);font-weight:800;
  font-size:calc(var(--cell)*.026);letter-spacing:.04em;padding:calc(var(--cell)*.012) 0;
  box-shadow:0 1px 5px rgba(0,0,0,.3);font-style:normal}
.tcFoot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:.4em;
  padding:calc(var(--cell)*.018) calc(var(--cell)*.028);background:var(--footBg);color:var(--footInk);
  border-top:1px solid var(--tileBd)}
.tcFoot .st{font-family:var(--display);font-size:calc(var(--cell)*.034);line-height:1.1;letter-spacing:-.01em}
.tcFoot .st.low{color:#C0392B}
.tcFoot .cur{text-align:right;line-height:1.05}
.tcFoot .cur b{display:block;font-family:var(--body);font-weight:700;font-size:calc(var(--cell)*.019);color:#8A93A3}
.tcFoot .cur s{text-decoration:none;font-family:var(--mono);font-weight:800;font-size:calc(var(--cell)*.034);color:var(--c)}
.tcBar{flex:0 0 auto;height:calc(var(--cell)*.018);background:var(--c)}
.grid.anim .tc{animation:rise .3s cubic-bezier(.2,.7,.3,1) both;animation-delay:calc(var(--i)*12ms)}
@media (prefers-reduced-motion:reduce){.grid.anim .tc{animation:none}}

@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.grid.anim .tk{animation:rise .3s cubic-bezier(.2,.7,.3,1) both;animation-delay:calc(var(--i)*12ms)}
@media (prefers-reduced-motion:reduce){.grid.anim .tk{animation:none}}

.chrome{position:fixed;right:14px;bottom:14px;display:flex;gap:8px;z-index:30;transition:opacity .4s}
.chrome.idle{opacity:0;pointer-events:none}
.cbtn{background:rgba(20,22,30,.9);color:#F2F1EC;border:1px solid rgba(255,255,255,.25);border-radius:8px;
  padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer}

/* ============ COUNTER-SIDE APP — red & white ============ */
#counter{height:100vh;overflow:auto;background:#F7F8FA;color:#14171F}
.cwrap{max-width:560px;margin:0 auto;padding:18px 16px 60px}
.chead{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.chead h2{font-size:19px;margin:0;font-weight:800;color:#D62828}
.chead .st{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:800;color:#fff;
  background:#D62828;padding:5px 9px;border-radius:999px}
.csec{background:#fff;border:1px solid #E2E5EA;border-radius:14px;padding:14px;margin-bottom:14px;
  box-shadow:0 1px 2px rgba(20,23,31,.05)}
.csec h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#8A93A1;
  display:flex;align-items:center;gap:7px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.cgrid.two{grid-template-columns:repeat(2,1fr)}
.cb{background:#fff;border:1.5px solid #CFD4DC;border-radius:11px;padding:15px 8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:700;font-size:13px;
  color:#14171F;transition:.12s}
.cb:hover{border-color:#D62828;color:#D62828;background:#FDECEC}
.cb.on{background:#D62828;border-color:#D62828;color:#fff}
.cb .ic{font-size:20px;line-height:1}
.cb .pz{font-family:var(--mono);font-weight:800;font-size:17px}
.cnum{display:flex;gap:8px}
.cnum input{flex:1;padding:12px;border:1.5px solid #CFD4DC;border-radius:11px;font-family:var(--mono);
  font-weight:800;font-size:16px;text-align:center;background:#fff;color:#14171F}
.cnum input:focus{border-color:#D62828;outline:none;box-shadow:0 0 0 3px #FDECEC}
.cbtn2{background:#D62828;color:#fff;border:none;border-radius:11px;padding:12px 18px;font-weight:700;cursor:pointer}
.cbtn2:hover{background:#A81E1E}
.cbtn2.ghost{background:#fff;color:#D62828;border:1.5px solid #CFD4DC}
.cbtn2.ghost:hover{border-color:#D62828;background:#FDECEC}

/* ============ BACKEND — red & white ============ */
:root{
  --r:#D62828;        /* the red */
  --r-dk:#A81E1E;     /* pressed / hover */
  --r-lt:#FDECEC;     /* red tint for fills */
  --ink:#14171F;      /* text */
  --ink-2:#5B6472;    /* secondary text */
  --ink-3:#8A93A1;    /* labels */
  --bd:#E2E5EA;       /* hairline */
  --bd-2:#CFD4DC;     /* input border */
  --sf:#FFFFFF;       /* panels */
  --sf-2:#F7F8FA;     /* page + table head */
}
#admin{height:100vh;overflow:auto;background:var(--sf-2);color:var(--ink)}
.awrap{max-width:1240px;margin:0 auto;padding:22px 20px 90px}
.ahead{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.ahead h2{font-family:var(--display);font-size:27px;margin:0 0 3px;color:var(--r)}
.ahead p{margin:0;color:var(--ink-2);font-size:13.5px}
.sp{flex:1}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;border-bottom:2px solid var(--bd);padding-bottom:10px}
.tab{background:transparent;color:var(--ink-2);border:1px solid transparent;border-radius:9px;padding:8px 13px;
  font-size:13.5px;font-weight:700;cursor:pointer}
.tab:hover{color:var(--r);background:var(--r-lt)}
.tab.on{background:var(--r);color:#fff}
.btn{background:#fff;color:var(--ink);border:1.5px solid var(--bd-2);border-radius:9px;padding:9px 14px;
  font-size:13.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--r);color:var(--r)}
.btn.go{background:var(--r);color:#fff;border-color:var(--r)}
.btn.go:hover{background:var(--r-dk);border-color:var(--r-dk);color:#fff}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:7px}
.btn.danger{color:var(--r);border-color:#F0B9B9;background:var(--r-lt)}
.btn.danger:hover{background:var(--r);color:#fff;border-color:var(--r)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:14px;margin-bottom:16px;overflow:hidden;
  box-shadow:0 1px 2px rgba(20,23,31,.05)}
.ph{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--bd);
  background:var(--sf-2);flex-wrap:wrap}
.ph h3{margin:0;font-size:14.5px;font-weight:700}
.ph .hint{color:var(--ink-2);font-size:12.5px}
.pb{padding:15px 16px}
.fields{display:flex;gap:13px;flex-wrap:wrap;align-items:flex-end}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-3);font-weight:700}
.f input,.f select,.f textarea{background:#fff;color:var(--ink);border:1.5px solid var(--bd-2);border-radius:8px;
  padding:9px 11px;font-family:var(--body);font-size:14px}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--r);outline:none;box-shadow:0 0 0 3px var(--r-lt)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;
  color:var(--ink-3);font-weight:700;padding:10px;border-bottom:2px solid var(--bd);background:var(--sf-2)}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:var(--r-lt)}
.rno{font-family:var(--mono);font-weight:800;color:var(--ink-3);font-size:12px}
.in{width:100%;background:#fff;color:var(--ink);border:1.5px solid var(--bd-2);border-radius:7px;
  padding:7px 9px;font-size:13.5px}
.in.mono{font-family:var(--mono);font-weight:700;text-align:center}
.in:focus{border-color:var(--r);outline:none;box-shadow:0 0 0 3px var(--r-lt)}
.thumb{width:40px;height:54px;border-radius:5px;background:var(--sf-2);border:1px solid var(--bd);display:flex;
  align-items:center;justify-content:center;overflow:hidden;flex:0 0 auto}
.thumb img{width:100%;height:100%;object-fit:contain}
.thumb.none{border-style:dashed;color:var(--ink-3);font-size:8.5px;font-family:var(--mono);text-align:center}
.imgcell{display:flex;align-items:center;gap:8px}
.chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);white-space:nowrap}
.chk input{accent-color:var(--r)}
.note{display:flex;gap:10px;background:var(--r-lt);border:1px solid #F3C9C9;border-left:4px solid var(--r);
  border-radius:10px;padding:11px 14px;font-size:13px;color:#6B4A4A;line-height:1.5}
.note b{color:var(--ink)}
.note code{background:#fff;padding:1px 5px;border-radius:4px;border:1px solid #F0C4C4}
.swatch{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:34px;height:34px;border-radius:8px;border:2px solid var(--bd);cursor:pointer}
.sw.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}
.themes{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.th{border:1.5px solid var(--bd-2);border-radius:11px;padding:11px;cursor:pointer;text-align:left;background:#fff}
.th:hover{border-color:var(--r)}
.th.on{border-color:var(--r);background:var(--r-lt)}
.th .bars{display:flex;gap:3px;margin-bottom:8px}
.th .bars i{height:22px;flex:1;border-radius:3px}
.th b{font-size:13px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.stat{background:var(--sf);border:1px solid var(--bd);border-left:4px solid var(--r);border-radius:11px;padding:13px}
.stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700}
.stat .v{font-family:var(--mono);font-weight:800;font-size:23px;margin-top:5px}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(14px);background:var(--r);color:#fff;
  font-weight:700;font-size:13.5px;padding:11px 18px;border-radius:10px;opacity:0;pointer-events:none;
  transition:.22s;z-index:99;box-shadow:0 6px 20px rgba(214,40,40,.35)}
#toast.on{opacity:1;transform:translateX(-50%)}
@media(max-width:820px){.legend{display:none}.rail{display:none}}
</style>
</head>
<body>

<!-- ============ TV BOARD ============ -->
<div id="board">
  <div id="bgLayer"></div><div id="bgScrim"></div>
  <div class="bar">
    <img id="bLogo" class="logo hidden" alt="">
    <div class="mark"><h1 id="bTitle">Store</h1><div class="sub" id="bSub"></div></div>
    <div class="legend" id="bLegend"></div>
  </div>
  <div class="jp hidden" id="bJp"></div>
  <div class="stage">
    <div class="grid anim" id="bGrid"></div>
    <div class="rail hidden" id="bRail"></div>
  </div>
  <div class="dw hidden" id="bDraws"></div>
</div>
<div class="chrome" id="chrome">
  <span class="cbtn" id="link" style="cursor:default">● …</span>
  <button class="cbtn" id="goFull">Full screen</button>
  <button class="cbtn" id="goCounter">Counter app</button>
  <button class="cbtn" id="goAdmin">Backend</button>
</div>

<!-- ============ COUNTER-SIDE APP ============ -->
<div id="counter" class="hidden">
  <div class="cwrap">
    <div class="chead">
      <h2>Show tickets on screen</h2>
      <span class="st" id="cStatus">SHOWING ALL</span>
    </div>

    <div class="csec">
      <h3>By price</h3>
      <div class="cgrid" id="cPrices"></div>
    </div>

    <div class="csec">
      <h3>Quick views</h3>
      <div class="cgrid two">
        <button class="cb" data-mode="new"><span class="ic">🆕</span>New tickets</button>
        <button class="cb" data-mode="lucky"><span class="ic">🍀</span>Lucky tickets</button>
        <button class="cb" data-mode="ending"><span class="ic">⌛</span>Ending tickets</button>
        <button class="cb" data-mode="recommended"><span class="ic">⭐</span>Recommended game</button>
        <button class="cb" data-mode="slots"><span class="ic">🎯</span>Recommended slots</button>
        <button class="cb" data-mode="all"><span class="ic">▦</span>Show all 40</button>
      </div>
    </div>

    <div class="csec">
      <h3>Ticket on number</h3>
      <div class="cnum">
        <input id="cNum" inputmode="numeric" placeholder="Slot no." maxlength="4">
        <button class="cbtn2" id="cNumGo">Show</button>
        <button class="cbtn2 ghost" id="cBack">Back to all</button>
      </div>
    </div>

    <div class="csec">
      <h3>Log a sale</h3>
      <div class="cgrid" id="cSell"></div>
      <div style="margin-top:10px;font-size:12.5px;color:var(--ink-3)">Tap a price to record one ticket sold today. Totals show in the backend under Sales.</div>
    </div>

    <div style="display:flex;gap:8px">
      <button class="cbtn2 ghost" id="cToBoard">Open TV board</button>
      <button class="cbtn2 ghost" id="cToAdmin">Backend</button>
    </div>
  </div>
</div>

<!-- ============ BACKEND ============ -->
<div id="admin" class="hidden">
  <div class="awrap">
    <div class="ahead">
      <div><h2 id="aStoreName">Backend</h2><p>Everything on the TV is set here. Saves push to the board instantly.</p></div>
      <div class="sp"></div>
      <span id="link" class="rno" style="padding:9px 4px">● …</span>
      <select id="aStore" class="in" style="width:auto;padding:9px 11px"></select>
      <button class="btn" id="aExport">Back up</button>
      <button class="btn" id="aImportBtn">Restore</button>
      <input type="file" id="aImport" accept="application/json" class="hidden">
      <button class="btn go" id="aBoard">Open TV board</button>
    </div>
    <div class="tabs" id="aTabs"></div>
    <div id="aBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ---------------- storage ----------------
   Two modes:
   · SERVED  — running under server.py. The board lives on the server, so the TV, the
               counter phone and the backend all see the same thing. Changes made
               anywhere show up everywhere within ~1.5s.
   · SOLO    — opened as a plain file. Falls back to this browser's own storage
               (fine for one machine; other devices won't see it).                     */
const KEY='lotterydisplay.v1';
const PIN='0987';
const pinOK=()=>localStorage.getItem('ld.pin')===PIN;
function askPin(){
  const v=prompt('Enter PIN to continue');
  if(v===PIN){localStorage.setItem('ld.pin',PIN);return true}
  if(v!==null)toast('Wrong PIN');
  return false;
}
let mem=null, SERVED=false, rev=0, pushT=null, pulling=false;
const local={
  get(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):null}catch(e){return mem}},
  set(v){try{localStorage.setItem(KEY,JSON.stringify(v))}catch(e){mem=v;
    if(/quota|exceed/i.test(String(e)))toast('Storage full — use smaller pictures, or link them instead')}}
};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let tt;const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),1900)};

/* push to the server, debounced — a burst of edits becomes one write */
function push(){
  if(!SERVED)return;
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    try{
      const r=await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json','X-Pin':PIN},
        body:JSON.stringify({state:db})});
      const j=await r.json();
      if(j.rev)rev=j.rev;           // remember our own write so we don't re-pull it
      setLink(true);
    }catch(e){setLink(false)}
  },220);
}
/* has anyone else changed the board? */
async function pull(){
  if(!SERVED||pulling)return;
  try{
    const r=await fetch('/api/rev',{cache:'no-store'});
    const j=await r.json();
    if(j.rev===rev){setLink(true);return}
    // don't yank a field out from under someone who's typing in the backend
    const typing=document.activeElement&&/^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName);
    if(typing&&location.hash==='#admin')return;
    pulling=true;
    const r2=await fetch('/api/state',{cache:'no-store'});
    const j2=await r2.json();
    if(j2.state){db=j2.state;rev=j2.rev;local.set(db);route()}
    setLink(true);
  }catch(e){setLink(false)}
  finally{pulling=false}
}
function setLink(ok){
  const txt=SERVED?(ok?'● live':'● offline'):'● this device only';
  const col=SERVED?(ok?'#6BBF59':'#E05C5C'):'#8E97AA';
  $$('#link,[id="link"]').forEach(el=>{el.textContent=txt;el.style.color=col;});
}
const save=()=>{local.set(db);push();};

/* Ticket art. A Texas Lottery picture is served from our own machine (/art/2747.gif) —
   the state's site can refuse hotlinked images, and this way the TV needs no internet.
   Anything you uploaded yourself is left exactly as it is. */
const TXART=/texaslottery\.com.*?scratchoffs\/(\d{3,5})_/i;
function imgSrc(u){
  u=String(u||'');
  if(!u)return '';
  if(u.startsWith('data:'))return u;            // you uploaded it — already local
  if(!SERVED)return u;                          // no server, nothing we can do
  const m=u.match(TXART);
  if(m)return `/art/${m[1]}.gif`;               // Texas Lottery ticket art
  if(/^https?:\/\//i.test(u))return `/api/img?u=${encodeURIComponent(u)}`;  // any other link
  return u;
}
/* if the local copy misses, fall back to the state's URL; if that fails too, show the price */
function imgTag(g,cls=''){
  const src=imgSrc(g.img);
  const back=esc(g.img||'');
  return `<img ${cls?`class="${cls}" `:''}src="${esc(src)}" alt="" loading="lazy"
    onerror="if(!this.dataset.t){this.dataset.t=1;this.src='${back}';}else{this.style.display='none';if(this.nextElementSibling)this.nextElementSibling.style.display='';}">`;
}

const filled=g=>!!(g.name||g.img||g.no);
/* a game is "ending" if the state called it, or its top prizes are down to the threshold */
const isEnding=(g,at)=>!!g.closing||(g.prizesLeft!==''&&g.prizesLeft!=null&&+g.prizesLeft<=+at);
function statusOf(g,at){
  const pl=(g.prizesLeft!==''&&g.prizesLeft!=null)?+g.prizesLeft:null;
  if(pl===0)return{txt:'LAST CHANCE',low:true};
  if(pl!=null&&pl<=+at)return{txt:`ONLY ${pl} LEFT`,low:true};
  if(g.closing)return{txt:'CLOSING SOON',low:true};
  return{txt:'GOOD LUCK',low:false};
}
/* recommended = best top-prizes-left per dollar, among filled games with data */
function recommended(games){
  const c=games.filter(g=>filled(g)&&+g.price>0&&+g.prizesLeft>0);
  if(!c.length)return null;
  return c.slice().sort((a,b)=>(+b.prizesLeft/+b.price)-(+a.prizesLeft/+a.price))[0];
}
function recSlots(games,at){ // healthy stock + prizes still out there
  return games.filter(g=>filled(g)&&+g.prizesLeft>+at).slice(0,10).map(g=>g.slot);
}
function shownGames(st){
  let g=st.games.filter(x=>st.view.empty==='hide'?filled(x):true);
  if(st.view.sort==='num')g=[...g].sort((a,b)=>(+a.no||9e9)-(+b.no||9e9));
  if(st.view.sort==='price')g=[...g].sort((a,b)=>(+a.price||9e9)-(+b.price||9e9)||(+a.slot)-(+b.slot));
  return g;
}

/* ---------------- pictures ---------------- */
function shrink(file,MAX=380){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onerror=()=>rej(new Error('Could not read that file'));
    fr.onload=()=>{const im=new Image();
      im.onerror=()=>rej(new Error('That file is not an image'));
      im.onload=()=>{const s=Math.min(1,MAX/Math.max(im.width,im.height));
        const c=document.createElement('canvas');c.width=Math.round(im.width*s);c.height=Math.round(im.height*s);
        c.getContext('2d').drawImage(im,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.78));};
      im.src=fr.result;};
    fr.readAsDataURL(file);});
}
/* one prompt for every "Link" button. An uploaded picture has no URL to show, so the box
   starts empty; leaving it empty clears the picture. Returns null if you hit Cancel. */
function askLink(current,label='Link to the picture (paste an image URL):'){

}

/* Draw-game results (Powerball, Pick 3, ...) — server.py scrapes the texaslottery.com
   homepage for us and caches it, so the board just polls /api/txdraws now and then. */
let DRAWS=null;
async function loadDraws(){
  if(!SERVED)return;
  try{
    const r=await fetch('/api/txdraws',{cache:'no-store'});
    const j=await r.json();
    if(j.ok&&j.games&&j.games.length){
      DRAWS=j.games;
      if(!location.hash||location.hash==='#board')renderBoard();
    }
  }catch(_){/* offline is fine — the strip just stays hidden */}
}
setInterval(loadDraws,10*60*1000);
function renderDraws(st){
  const el=$('#bDraws');
  const on=st.view.showDraws!==false&&DRAWS&&DRAWS.length;
  el.classList.toggle('hidden',!on);
  if(!on){el.innerHTML='';el.dataset.key='';return}
  const items=DRAWS.map(g=>{
    const r=(g.results&&g.results[0])||null;
    return `<div class="dwi">
      ${g.logo?`<img class="glogo" src="${esc(imgSrc(g.logo))}" alt="${esc(g.name)}"
          onerror="this.outerHTML='<div class=&quot;gname&quot;>${esc(g.name)}</div>'">`
        :`<div class="gname">${esc(g.name)}</div>`}
      ${g.amount?`<div class="amt ${g.alert?'alert':''}">${esc(g.amount)}</div>`:''}
      ${g.next?`<div class="lbl">Next draw ${esc(g.next)}</div>`:''}
      ${r?`<div class="lbl">${r.label?esc(r.label)+' · ':''}${esc(r.date)}</div>
        <div class="balls">${r.nums.map(n=>`<i class="${n.cls==='fireball'?'fb':n.cls?'sp':''}">${esc(n.n)}</i>`).join('')}</div>`:''}
    </div>`;
  }).join('');
  // the board redraws itself every few seconds — only rebuild the ticker when its
  // content actually changed, or the crawl would visibly jump back to the start
  if(el.dataset.key===items)return;
  el.dataset.key=items;
  el.innerHTML=`<div class="dwTrack"><div class="dwHalf">${items}</div><div class="dwHalf">${items}</div></div>`;
  // pace the crawl by how much there is to read, not by a fixed lap time
  requestAnimationFrame(()=>{const t=el.firstElementChild;
    if(t)t.style.setProperty('--dwSecs',Math.max(30,Math.round(t.scrollWidth/2/70))+'s')});
}

/* size the grid to fill the stage edge to edge. 'auto' columns picks whatever column
   count gives the biggest, squarest tiles for this screen; a number forces that many
   across. Tracks stretch to use every pixel, so there's no dead margin left or right. */
function bestCols(total,availW,availH){
  let best=4,bestCell=0;
  for(let c=4;c<=Math.min(14,total);c++){
    const r=Math.ceil(total/c);
    const cell=Math.min(availW/c,availH/r);
    if(cell>bestCell){bestCell=cell;best=c}
  }
  return best;
}
function fitGrid(cols,total){
  const stage=$('.stage'),grid=$('#bGrid'),rail=$('#bRail');
  if(!stage||!grid)return;
  const railW=(rail&&!rail.classList.contains('hidden'))?rail.getBoundingClientRect().width:0;
  const availW=stage.clientWidth-railW,availH=stage.clientHeight;
  if(availW<=0||availH<=0)return;
  if(cols==='auto')cols=bestCols(total||40,availW,availH);
  const rows=Math.max(1,Math.ceil((total||40)/cols));
  const GAP=.022,PAD=.05; // matches the .grid gap/padding formulas below, both in units of --cell
  // typography scales off the smaller side of a tile, so badges never outgrow the art
  const cell=Math.max(20,Math.floor(Math.min(
    availW/(cols+(cols-1)*GAP+PAD),
    availH/(rows+(rows-1)*GAP+PAD)
  )));
  const chrome=(n,avail)=>Math.max(20,Math.floor((avail-((n-1)*GAP+PAD)*cell)/n));
  const cw=chrome(cols,availW),ch=chrome(rows,availH);
  grid.style.setProperty('--cell',cell+'px');
  grid.style.gridTemplateColumns=`repeat(${cols},${cw}px)`;
  grid.style.gridTemplateRows=`repeat(${rows},${ch}px)`;
}

  if(st.brand.logo){lg.src=imgSrc(st.brand.logo);lg.classList.remove('hidden')}else lg.classList.add('hidden');

  const used=[...new Set(st.games.filter(filled).map(g=>+g.price).filter(Boolean))].sort((a,b)=>a-b);
  $('#bLegend').innerHTML=used.map(p=>`<span class="lg" style="--c:${tierColor(p)}"><i></i>$${p}</span>`).join('');

  // jackpots
  const jp=$('#bJp');

    jp.innerHTML=st.jackpots.map(j=>`<div class="jpi"><b>${esc(j.game)}</b><s>${esc(j.amount)}</s>${j.draw?`<em>${esc(j.draw)}</em>`:''}</div>`).join('');
  }else jp.classList.add('hidden');

  // live draw results — set visibility before fitGrid measures the stage
  renderDraws(st);

  // stage: spotlight or grid
  const grid=$('#bGrid');
  const stale=cmd.at&&db.cmd.holdSecs&&(Date.now()-cmd.at)/1000>db.cmd.holdSecs;
  const mode=stale?'all':(cmd.mode||'all');

  if(mode==='recommended'){
    const g=recommended(st.games);
    grid.className='grid';grid.style.display='block';
    grid.style.gridTemplateColumns='';grid.style.gridTemplateRows='';lastGridFit=null;
    grid.innerHTML=g?spotlight(g,st,'Recommended game'):'<div class="spot"><div class="info"><h2>Add prize data to get a recommendation</h2></div></div>';
  }else if(mode==='number'){
    const g=st.games.find(x=>String(x.slot)===String(cmd.value)||String(x.no)===String(cmd.value));
    grid.className='grid';grid.style.display='block';
    grid.style.gridTemplateColumns='';grid.style.gridTemplateRows='';lastGridFit=null;
    grid.innerHTML=g&&filled(g)?spotlight(g,st,'Ticket '+cmd.value):`<div class="spot"><div class="info"><h2>No ticket at ${esc(cmd.value)}</h2></div></div>`;
  }else{
    grid.className='grid anim square';grid.style.display='';
    const list=shownGames(st);
    const slots=mode==='slots'?recSlots(st.games,st.view.endingAt):null;
    grid.innerHTML=list.map((g,i)=>{
      let dim=false,pick=false;
      if(mode==='price')dim=+g.price!==+cmd.value;
      if(mode==='new')dim=!g.isNew;
      if(mode==='lucky')dim=!g.isLucky;
      if(mode==='ending')dim=!isEnding(g,st.view.endingAt);
      if(mode==='slots'){pick=slots.includes(g.slot);dim=!pick}
      if(!filled(g))dim=dim||mode!=='all';
      return ticketTile(g,i,st,{dim,pick});
    }).join('');
    lastGridFit=[st.view.cols==='auto'?'auto':(+st.view.cols||5),list.length];
    fitGrid(...lastGridFit);
  }

  // rail: ads + winners
  const rail=$('#bRail');
  const wantAds=st.view.showAds&&st.ads.length, wantWin=st.view.showWinners&&st.winners.length;
  if(wantAds||wantWin){
    rail.classList.remove('hidden');
    rail.innerHTML=(wantAds?`<div class="ad" id="adSlot"></div>`:'')+
      (wantWin?`<div class="win"><div class="kick">Recent winners here</div>${
        st.winners.slice(0,6).map(w=>`<div class="w"><span>${esc(w.name)} · ${esc(w.game)}</span><b>${esc(w.amount)}</b></div>`).join('')
      }</div>`:'');
    clearInterval(adTimer);
    if(wantAds){
      const paint=()=>{const a=st.ads[adIdx%st.ads.length],el=$('#adSlot');if(!el)return;
        el.style.opacity=0;
        setTimeout(()=>{el.innerHTML=`<div class="kick">${esc(a.kick||'In store now')}</div>
          ${a.img?`<img src="${esc(imgSrc(a.img))}" alt="">`:''}${a.text?`<div class="txt">${esc(a.text)}</div>`:''}`;
          el.style.opacity=1;},220);};
      paint();
      adTimer=setInterval(()=>{adIdx++;paint()},Math.max(3,+st.view.adSecs||8)*1000);
    }
  }else{rail.classList.add('hidden');clearInterval(adTimer)}
}

function pushCmd(mode,value=''){
  db.cmd={mode,value,at:Date.now(),holdSecs:db.cmd?.holdSecs??30};
  save();renderCounter();
  if(!location.hash||location.hash==='#board')renderBoard();
}
function renderCounter(){
  const st=S(),cmd=db.cmd||{mode:'all'};
  const used=[...new Set(st.games.filter(filled).map(g=>+g.price).filter(Boolean))].sort((a,b)=>a-b);
  $('#cPrices').innerHTML=(used.length?used:[1,2,5,10]).map(p=>
    `<button class="cb ${cmd.mode==='price'&&+cmd.value===p?'on':''}" data-price="${p}"><span class="pz">$${p}</span></button>`).join('');
  $('#cSell').innerHTML=(used.length?used:[1,2,5,10]).map(p=>
    `<button class="cb" data-sell="${p}"><span class="pz">$${p}</span><span style="font-size:11px;font-weight:600">sold</span></button>`).join('');
  $$('#counter [data-mode]').forEach(b=>b.classList.toggle('on',b.dataset.mode===cmd.mode));
  const label={all:'SHOWING ALL',price:'SHOWING $'+cmd.value,new:'NEW TICKETS',lucky:'LUCKY TICKETS',
    ending:'ENDING TICKETS',recommended:'RECOMMENDED',slots:'RECOMMENDED SLOTS',number:'TICKET '+cmd.value}[cmd.mode]||'SHOWING ALL';
  $('#cStatus').textContent=label;
}
function logSale(price){
  const st=S(),d=new Date().toISOString().slice(0,10);
  st.sales[d]=st.sales[d]||{};
  st.sales[d][price]=(st.sales[d][price]||0)+1;
  save();toast(`$${price} ticket logged`);
}

/* take a freshly fetched catalog: refresh the browse list, and refresh any game already on
   the board IN PLACE — slots, current-ticket counts and hand-typed prizes are never disturbed */
function applyCatalog(st,arr){
  if(!Array.isArray(arr)||!arr.length)return{upd:0};
  TX=arr.map(x=>({
    no:String(x.no??'').trim(),
    name:x.name||'',
    price:+String(x.price??'').replace(/[^0-9.]/g,'')||0,
    img:x.img||'',
    feat:!!x.featured,
    isNew:!!x.new,
    closing:!!x.closing,
    endDate:x.endDate||null,
    prizesLeft:(x.prizesLeft===0||x.prizesLeft)?x.prizesLeft:null
  })).filter(g=>g.no&&g.price);
  let upd=0;
  TX.forEach(g=>{
    const s=st.games.find(y=>String(y.no)===g.no);
    if(!s)return;
    s.name=g.name;s.price=String(g.price);s.img=g.img;
    s.isNew=g.isNew;s.isLucky=g.feat;
    s.closing=!!g.closing;s.endDate=g.endDate||'';
    // the state only ever tells us "zero left"; anything you typed by hand stays
    if(g.prizesLeft!=null)s.prizesLeft=String(g.prizesLeft);
    upd++;
  });
  return{upd};
}
/* swap what's in two slots — the slot numbers stay put, the games trade places */
function swapSlots(st,i,j){
  if(i===j||i<0||j<0||i>39||j>39)return false;
  const a=st.games[i],b=st.games[j];
  st.games[i]=b;st.games[j]=a;
  st.games[i].slot=i+1;st.games[j].slot=j+1;
  return true;
}
/* write a catalog game into a slot the user picked.
   already on the board?  -> the two slots SWAP (a game never lands in two places)
   not on the board yet?  -> it lands in the slot (caller confirms any overwrite) */
function txAssign(st,no,idx){
  const g=TX.find(x=>x.no===no);if(!g||idx==null||idx<0||idx>39)return false;
  const at=st.games.findIndex(x=>String(x.no)===no);
  if(at>=0)return swapSlots(st,at,idx);
  const s=st.games[idx];
  s.no=g.no;s.name=g.name;s.price=String(g.price);s.img=g.img;s.isNew=g.isNew;s.isLucky=g.feat;
  s.closing=!!g.closing;s.endDate=g.endDate||'';
  s.prizesLeft=g.prizesLeft!=null?String(g.prizesLeft):'';
  s.current='';
  return true;
}
/* bulk add still fills the open slots in order */
function txAdd(st,no){
  const g=TX.find(x=>x.no===no);if(!g)return false;
  if(st.games.some(x=>String(x.no)===no))return false;
  const slot=st.games.findIndex(x=>!filled(x));if(slot<0)return false;
  return txAssign(st,no,slot);
}
/* a sensible 40: new + featured first, then a spread across price points */
function txAutoFill(st){
  st.games=blankGames();
  const seen=new Set(),pick=[];
  const take=g=>{if(!seen.has(g.no)&&pick.length<40){seen.add(g.no);pick.push(g)}};
  TX.filter(g=>g.isNew).forEach(take);
  TX.filter(g=>g.feat).forEach(take);
  const byPrice={};TX.forEach(g=>{(byPrice[g.price]=byPrice[g.price]||[]).push(g)});
  const prices=Object.keys(byPrice).map(Number).sort((a,b)=>a-b);
  let round=0;
  while(pick.length<40&&round<30){prices.forEach(p=>{const g=byPrice[p][round];if(g)take(g)});round++}
  pick.slice(0,40).forEach((g,i)=>{const s=st.games[i];
    s.no=g.no;s.name=g.name;s.price=String(g.price);s.img=g.img;s.isNew=g.isNew;s.isLucky=g.feat;
    s.closing=!!g.closing;s.endDate=g.endDate||'';
    if(g.prizesLeft!=null)s.prizesLeft=String(g.prizesLeft);});
  return pick.length;
}

/* ---------------- routing / chrome ---------------- */
function route(){
  const h=location.hash;
  const isAdmin=h==='#admin',isCounter=h==='#counter';
  if((isAdmin||isCounter)&&!pinOK()){
    if(!askPin()){location.hash='';route();return}
  }
  $('#admin').classList.toggle('hidden',!isAdmin);
  $('#counter').classList.toggle('hidden',!isCounter);
  $('#board').classList.toggle('hidden',isAdmin||isCounter);
  $('#chrome').classList.toggle('hidden',isAdmin||isCounter);
  if(isAdmin)renderAdmin();else if(isCounter)renderCounter();else renderBoard();
}
window.addEventListener('hashchange',route);
$('#goAdmin').onclick=()=>location.hash='#admin';
$('#goCounter').onclick=()=>location.hash='#counter';
$('#aBoard').onclick=()=>location.hash='';
$('#goFull').onclick=()=>{document.fullscreenElement?document.exitFullscreen():
  document.documentElement.requestFullscreen?.().catch(()=>toast('Full screen was blocked'))};

$('#aExport').onclick=()=>{const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));
  a.download='lottery-display-backup.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded')};
$('#aImportBtn').onclick=()=>$('#aImport').click();
$('#aImport').onchange=e=>{const f=e.target.files[0];if(!f)return;const fr=new FileReader();
  fr.onload=()=>{try{const s=JSON.parse(fr.result);if(!s.stores)throw 0;db=s;save();renderAdmin();toast('Restored')}
    catch(_){toast('That file is not a backup')}};fr.readAsText(f)};

/* same-browser tabs still sync instantly */
window.addEventListener('storage',e=>{
  if(e.key!==KEY||SERVED)return;
  const s=local.get();if(!s)return;db=s;route();
});
/* every device polls the server — this is what makes the phone drive the TV */
setInterval(pull,1500);
/* the board self-refreshes so a held counter view reverts on its own */
setInterval(()=>{if(!location.hash||location.hash==='#board')renderBoard()},5000);

/* connect to the server if we're being served by it */
(async function boot(){
  try{
    const r=await fetch('/api/state',{cache:'no-store'});
    if(!r.ok)throw 0;
    const j=await r.json();
    SERVED=true;rev=j.rev||0;
    if(j.state&&j.state.stores&&j.state.stores.length){db=j.state;local.set(db)}
    else{push()}                       // first run: seed the server from this browser
    route();setLink(true);
    loadDraws();
  }catch(e){SERVED=false;setLink(false)}
})();

let idle;const wake=()=>{$('#chrome').classList.remove('idle');clearTimeout(idle);
  idle=setTimeout(()=>$('#chrome').classList.add('idle'),3000)};
['mousemove','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,wake));
wake();route();
</script>
</body>
</html>
